apiVersion: apps/v1
kind: Deployment
metadata:
  name: learnbetter-site
  labels:
    app.kubernetes.io/name: learnbetter-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: learnbetter-site
  template:
    metadata:
      annotations:
        learnbetter.dev/site-revision: "dark-guide-v1"
      labels:
        app.kubernetes.io/name: learnbetter-site
    spec:
      containers:
        - name: site
          image: learnbetter-site:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
